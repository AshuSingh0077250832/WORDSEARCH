<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Search Challenge</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#2f6f5e,#4b8f7d);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container{
    background:#f3f3f3;
    padding:30px;
    border-radius:20px;
    width:95%;
    max-width:900px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    position:relative;
}
h1{
    text-align:center;
    margin-bottom:10px;
}
.top-bar{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    font-weight:bold;
}
.grid{
    display:grid;
    gap:6px;
    user-select:none;
}
.cell{
    background:#e6e6e6;
    width:40px;
    height:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}
.cell.found{
    color:#fff;
}
.word-list{
    margin-top:20px;
    text-align:center;
}
.word{
    display:inline-block;
    padding:6px 12px;
    margin:5px;
    background:#ddd;
    border-radius:12px;
}
.word.found{
    text-decoration:line-through;
    background:#bbb;
}
.restart{
    display:block;
    margin:15px auto 0;
    padding:8px 20px;
    border:none;
    background:#2f6f5e;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}
canvas{
    position:absolute;
    top:0;
    left:0;
    pointer-events:none;
}
@media(max-width:600px){
    .cell{width:30px;height:30px;font-size:14px;}
}
</style>
</head>
<body>
<div class="container">
<h1>Word Search Challenge</h1>

<div class="top-bar">
<div>⏱ Time: <span id="timer">0</span>s</div>
<div>⭐ Score: <span id="score">0</span></div>
</div>

<div id="grid" class="grid"></div>
<canvas id="lineCanvas"></canvas>

<div class="word-list" id="wordList"></div>
<button class="restart" onclick="location.reload()">Restart</button>
</div>

<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3"></audio>

<script>
const words = ["ASHUTOSH","SAMYUKHTHA","CHRISTINE","SIMRAN"];
const gridSize = 12;

let gridArray = [];
let foundWords = [];
let score = 0;
let seconds = 0;
let timerInterval;

const grid = document.getElementById("grid");
const wordList = document.getElementById("wordList");
const canvas = document.getElementById("lineCanvas");
const ctx = canvas.getContext("2d");

function startTimer(){
    timerInterval = setInterval(()=>{
        seconds++;
        document.getElementById("timer").innerText = seconds;
    },1000);
}

function generateEmptyGrid(){
    for(let r=0;r<gridSize;r++){
        gridArray[r]=[];
        for(let c=0;c<gridSize;c++){
            gridArray[r][c]="";
        }
    }
}

function placeWord(word){
    const directions = [
        [0,1],[1,0],[1,1],[-1,1]
    ];
    let placed=false;
    while(!placed){
        const dir = directions[Math.floor(Math.random()*directions.length)];
        const row = Math.floor(Math.random()*gridSize);
        const col = Math.floor(Math.random()*gridSize);
        let fits=true;
        for(let i=0;i<word.length;i++){
            const r=row+i*dir[0];
            const c=col+i*dir[1];
            if(r<0||c<0||r>=gridSize||c>=gridSize||gridArray[r][c]!=="" ){
                fits=false;
                break;
            }
        }
        if(fits){
            for(let i=0;i<word.length;i++){
                gridArray[row+i*dir[0]][col+i*dir[1]] = word[i];
            }
            placed=true;
        }
    }
}

function fillRandom(){
    const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            if(gridArray[r][c]===""){
                gridArray[r][c]=letters[Math.floor(Math.random()*26)];
            }
        }
    }
}

function renderGrid(){
    grid.style.gridTemplateColumns = `repeat(${gridSize},1fr)`;
    grid.innerHTML="";
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            const div=document.createElement("div");
            div.classList.add("cell");
            div.dataset.row=r;
            div.dataset.col=c;
            div.innerText=gridArray[r][c];
            grid.appendChild(div);
        }
    }
}

function renderWords(){
    words.forEach(w=>{
        const span=document.createElement("span");
        span.classList.add("word");
        span.id="word-"+w;
        span.innerText=w;
        wordList.appendChild(span);
    });
}

function setupSelection(){
    let startCell=null;
    let path=[];

    function clearLine(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
    }

    function resizeCanvas(){
        canvas.width=grid.offsetWidth;
        canvas.height=grid.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener("resize",resizeCanvas);

    function drawLine(cells){
        clearLine();
        if(cells.length<2)return;
        const rect=grid.getBoundingClientRect();
        const first=cells[0].getBoundingClientRect();
        const last=cells[cells.length-1].getBoundingClientRect();
        ctx.strokeStyle="rgba(0,0,0,0.3)";
        ctx.lineWidth=6;
        ctx.beginPath();
        ctx.moveTo(first.left-rect.left+first.width/2, first.top-rect.top+first.height/2);
        ctx.lineTo(last.left-rect.left+last.width/2, last.top-rect.top+last.height/2);
        ctx.stroke();
    }

    grid.addEventListener("mousedown",e=>{
        if(!e.target.classList.contains("cell")) return;
        startCell=e.target;
        path=[startCell];
    });

    grid.addEventListener("mousemove",e=>{
        if(!startCell) return;
        const cell=document.elementFromPoint(e.clientX,e.clientY);
        if(cell && cell.classList.contains("cell") && !path.includes(cell)){
            path.push(cell);
            drawLine(path);
        }
    });

    grid.addEventListener("mouseup",()=>{
        if(!startCell) return;
        const selectedWord = path.map(c=>c.innerText).join("");
        const reversed = selectedWord.split("").reverse().join("");

        if(words.includes(selectedWord) || words.includes(reversed)){
            const color = `hsl(${Math.random()*360},70%,50%)`;
            path.forEach(c=>{
                c.style.background=color;
                c.classList.add("found");
            });
            const actualWord = words.includes(selectedWord) ? selectedWord : reversed;
            document.getElementById("word-"+actualWord).classList.add("found");
            foundWords.push(actualWord);
            score+=100;
            document.getElementById("score").innerText=score;
            document.getElementById("correctSound").play();
            if(foundWords.length===words.length){
                clearInterval(timerInterval);
                document.getElementById("winSound").play();
            }
        }

        clearLine();
        startCell=null;
        path=[];
    });
}

generateEmptyGrid();
words.forEach(placeWord);
fillRandom();
renderGrid();
renderWords();
setupSelection();
startTimer();
</script>
</body>
</html>
