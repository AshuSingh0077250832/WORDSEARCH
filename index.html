<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Search Challenge</title>
<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#2f6f5e,#4ca38a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  background:#f4f4f4;
  padding:30px;
  border-radius:20px;
  box-shadow:0 25px 50px rgba(0,0,0,0.3);
  width:95%;
  max-width:1000px;
  text-align:center;
  position:relative;
}

h1{margin-bottom:10px;}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  font-weight:bold;
}

.grid{
  display:grid;
  gap:6px;
  margin:20px auto;
  touch-action:none;
  position:relative;
}

.cell{
  background:white;
  border-radius:8px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
  user-select:none;
  transition:0.2s;
}

.cell.found{
  animation:pop 0.3s ease;
  color:#000;
}

@keyframes pop{
  0%{transform:scale(0.8);}
  100%{transform:scale(1);}
}

.words{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin-top:15px;
}

.word{
  padding:6px 12px;
  background:#ddd;
  border-radius:20px;
  font-weight:bold;
}

.word.found{
  text-decoration:line-through;
  opacity:0.5;
}

button{
  margin-top:15px;
  padding:8px 16px;
  border:none;
  border-radius:8px;
  background:#2f6f5e;
  color:white;
  cursor:pointer;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}

</style>
</head>
<body>

<div class="container">
<h1>Word Search Challenge</h1>

<div class="topbar">
<div>⏱ Time: <span id="timer">0</span>s</div>
<div>⭐ Score: <span id="score">0</span></div>
</div>

<div id="grid" class="grid"></div>
<canvas id="lineCanvas"></canvas>

<div id="wordList" class="words"></div>
<button onclick="startGame()">Restart</button>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_1e9a1a8bb0.mp3">
</audio>

</div>

<script>
const words=["ASHUTOSH","SAMYUKHTHA","CHRISTINE","SIMRAN"];
const gridSize=12;
let grid=[];
let selected=[];
let foundWords=[];
let startCell=null;
let dragging=false;
let timer=0;
let score=0;
let interval=null;

const gridEl=document.getElementById("grid");
const wordList=document.getElementById("wordList");
const canvas=document.getElementById("lineCanvas");
const ctx=canvas.getContext("2d");

function startGame(){
  timer=0;
  score=0;
  foundWords=[];
  document.getElementById("score").textContent=0;
  document.getElementById("timer").textContent=0;
  clearInterval(interval);
  interval=setInterval(()=>{
    timer++;
    document.getElementById("timer").textContent=timer;
  },1000);

  document.getElementById("bgMusic").play();

  createGrid();
}

function createGrid(){
  grid=[];
  for(let r=0;r<gridSize;r++){
    grid[r]=Array(gridSize).fill("");
  }

  words.forEach(placeWord);
  fillRandom();
  renderGrid();
  renderWords();
}

function placeWord(word){
  const dirs=[[0,1],[1,0],[1,1],[-1,1]];
  let placed=false;

  while(!placed){
    let dir=dirs[Math.floor(Math.random()*dirs.length)];
    let row=Math.floor(Math.random()*gridSize);
    let col=Math.floor(Math.random()*gridSize);

    let fits=true;
    for(let i=0;i<word.length;i++){
      let r=row+dir[0]*i;
      let c=col+dir[1]*i;
      if(r<0||c<0||r>=gridSize||c>=gridSize||
        (grid[r][c]!==""&&grid[r][c]!==word[i])){
        fits=false;
        break;
      }
    }

    if(fits){
      for(let i=0;i<word.length;i++){
        grid[row+dir[0]*i][col+dir[1]*i]=word[i];
      }
      placed=true;
    }
  }
}

function fillRandom(){
  const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for(let r=0;r<gridSize;r++){
    for(let c=0;c<gridSize;c++){
      if(grid[r][c]==="")
        grid[r][c]=letters[Math.floor(Math.random()*letters.length)];
    }
  }
}

function renderGrid(){
  gridEl.innerHTML="";
  gridEl.style.gridTemplateColumns=`repeat(${gridSize},1fr)`;
  gridEl.style.width="600px";
  canvas.width=600;
  canvas.height=600;

  grid.forEach((row,r)=>{
    row.forEach((letter,c)=>{
      const div=document.createElement("div");
      div.className="cell";
      div.style.height=(600/gridSize)+"px";
      div.textContent=letter;
      div.dataset.row=r;
      div.dataset.col=c;
      gridEl.appendChild(div);
    });
  });
}

function renderWords(){
  wordList.innerHTML="";
  words.forEach(w=>{
    const div=document.createElement("div");
    div.className="word";
    div.id="word-"+w;
    div.textContent=w;
    wordList.appendChild(div);
  });
}

function getDirection(r1,c1,r2,c2){
  const dr=r2-r1;
  const dc=c2-c1;
  const stepR=Math.sign(dr);
  const stepC=Math.sign(dc);
  if(dr===0||dc===0||Math.abs(dr)===Math.abs(dc))
    return [stepR,stepC];
  return null;
}

function drawLine(start,end){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  ctx.strokeStyle="rgba(0,150,255,0.5)";
  ctx.lineWidth=8;
  ctx.lineCap="round";
  ctx.moveTo(start.x,start.y);
  ctx.lineTo(end.x,end.y);
  ctx.stroke();
}

function checkWord(){
  const word=selected.map(c=>c.textContent).join("");
  const reversed=word.split("").reverse().join("");

  words.forEach(w=>{
    if((word===w||reversed===w)&&!foundWords.includes(w)){
      selected.forEach(c=>{
        c.classList.add("found");
        c.style.background=randomColor();
      });
      document.getElementById("word-"+w).classList.add("found");
      foundWords.push(w);
      score+=100;
      document.getElementById("score").textContent=score;
    }
  });

  selected=[];
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function randomColor(){
  const colors=["#ffadad","#caffbf","#ffd6a5","#bdb2ff"];
  return colors[Math.floor(Math.random()*colors.length)];
}

gridEl.addEventListener("mousedown",startDrag);
gridEl.addEventListener("touchstart",startDrag);

function startDrag(e){
  const target=e.target.closest(".cell");
  if(!target)return;
  dragging=true;
  startCell=target;
  selected=[target];
}

gridEl.addEventListener("mousemove",moveDrag);
gridEl.addEventListener("touchmove",moveDrag);

function moveDrag(e){
  if(!dragging)return;
  let target=e.target.closest(".cell");
  if(!target)return;

  const r1=parseInt(startCell.dataset.row);
  const c1=parseInt(startCell.dataset.col);
  const r2=parseInt(target.dataset.row);
  const c2=parseInt(target.dataset.col);

  const dir=getDirection(r1,c1,r2,c2);
  if(!dir)return;

  selected=[];
  let r=r1,c=c1;
  while(true){
    const cell=document.querySelector(`[data-row="${r}"][data-col="${c}"]`);
    if(cell) selected.push(cell);
    if(r===r2&&c===c2) break;
    r+=dir[0];
    c+=dir[1];
  }

  const rect1=startCell.getBoundingClientRect();
  const rect2=target.getBoundingClientRect();
  drawLine(
    {x:rect1.left+rect1.width/2-gridEl.getBoundingClientRect().left,
     y:rect1.top+rect1.height/2-gridEl.getBoundingClientRect().top},
    {x:rect2.left+rect2.width/2-gridEl.getBoundingClientRect().left,
     y:rect2.top+rect2.height/2-gridEl.getBoundingClientRect().top}
  );
}

document.addEventListener("mouseup",endDrag);
document.addEventListener("touchend",endDrag);

function endDrag(){
  if(dragging){
    checkWord();
    dragging=false;
  }
}

startGame();
</script>
</body>
</html>
