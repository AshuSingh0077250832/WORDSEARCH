<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Search</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1f4037,#99f2c8);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.game-container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  text-align: center;
  width: 95%;
  max-width: 700px;
}

h1 {
  margin-top: 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 4px;
  margin: 20px 0;
}

.cell {
  width: 32px;
  height: 32px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  background: #f0f0f0;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
}

.cell.selected {
  background: #ffd166;
}

.cell.found {
  background: #06d6a0;
  color: white;
}

.word-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.word-list span {
  padding: 5px 10px;
  background: #eee;
  border-radius: 6px;
}

.word-list .found-word {
  text-decoration: line-through;
  background: #06d6a0;
  color: white;
}

#message {
  font-size: 18px;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="game-container">
  <h1>Word Search Challenge</h1>
  <div class="grid" id="grid"></div>
  <div class="word-list" id="wordList"></div>
  <div id="message"></div>
</div>

<script>
const words = ["ASHUTOSH","SAMYUKHTHA","CHRISTINE","SIMRAN"];
const gridSize = 12;
const grid = document.getElementById("grid");
const wordListDiv = document.getElementById("wordList");
const message = document.getElementById("message");

let board = [];
let selectedCells = [];
let isDragging = false;
let foundWords = [];

function init() {
  createEmptyBoard();
  placeWords();
  fillRandomLetters();
  renderGrid();
  renderWordList();
}

function createEmptyBoard() {
  board = Array(gridSize).fill(null).map(() => Array(gridSize).fill(""));
}

function placeWords() {
  const directions = [
    [0,1], [1,0], [1,1], [-1,1]
  ];

  words.forEach(word => {
    let placed = false;

    while(!placed) {
      const dir = directions[Math.floor(Math.random()*directions.length)];
      const row = Math.floor(Math.random()*gridSize);
      const col = Math.floor(Math.random()*gridSize);

      if(canPlace(word,row,col,dir)) {
        for(let i=0;i<word.length;i++){
          board[row + i*dir[0]][col + i*dir[1]] = word[i];
        }
        placed = true;
      }
    }
  });
}

function canPlace(word,row,col,dir) {
  for(let i=0;i<word.length;i++){
    const r = row + i*dir[0];
    const c = col + i*dir[1];

    if(r<0||c<0||r>=gridSize||c>=gridSize) return false;
    if(board[r][c]!=="" && board[r][c]!==word[i]) return false;
  }
  return true;
}

function fillRandomLetters() {
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for(let r=0;r<gridSize;r++){
    for(let c=0;c<gridSize;c++){
      if(board[r][c]===""){
        board[r][c] = letters[Math.floor(Math.random()*26)];
      }
    }
  }
}

function renderGrid() {
  grid.innerHTML="";
  board.forEach((row,r)=>{
    row.forEach((letter,c)=>{
      const cell=document.createElement("div");
      cell.classList.add("cell");
      cell.textContent=letter;
      cell.dataset.row=r;
      cell.dataset.col=c;

      cell.addEventListener("mousedown",startSelection);
      cell.addEventListener("mouseenter",dragSelection);
      cell.addEventListener("mouseup",endSelection);

      cell.addEventListener("touchstart",startSelection);
      cell.addEventListener("touchmove",touchDrag);
      cell.addEventListener("touchend",endSelection);

      grid.appendChild(cell);
    });
  });
}

function renderWordList(){
  wordListDiv.innerHTML="";
  words.forEach(word=>{
    const span=document.createElement("span");
    span.textContent=word;
    span.id="word-"+word;
    wordListDiv.appendChild(span);
  });
}

function startSelection(e){
  isDragging=true;
  selectedCells=[];
  selectCell(e.target);
}

function dragSelection(e){
  if(isDragging) selectCell(e.target);
}

function touchDrag(e){
  e.preventDefault();
  const touch = e.touches[0];
  const element = document.elementFromPoint(touch.clientX,touch.clientY);
  if(element && element.classList.contains("cell")){
    selectCell(element);
  }
}

function selectCell(cell){
  if(!selectedCells.includes(cell)){
    selectedCells.push(cell);
    cell.classList.add("selected");
  }
}

function endSelection(){
  isDragging=false;
  checkWord();
  selectedCells.forEach(cell=>cell.classList.remove("selected"));
  selectedCells=[];
}

function checkWord(){
  const word = selectedCells.map(c=>c.textContent).join("");
  const reverse = word.split("").reverse().join("");

  words.forEach(w=>{
    if((word===w || reverse===w) && !foundWords.includes(w)){
      foundWords.push(w);
      selectedCells.forEach(c=>c.classList.add("found"));
      document.getElementById("word-"+w).classList.add("found-word");
    }
  });

  if(foundWords.length===words.length){
    message.textContent="🎉 All words found!";
  }
}

init();
</script>

</body>
</html>
