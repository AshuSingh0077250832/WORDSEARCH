<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Search Challenge</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#3a7d6a,#5aa38a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  background:#f4f4f4;
  padding:30px;
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  width:95%;
  max-width:900px;
  text-align:center;
}

h1{
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:6px;
  margin:20px auto;
  touch-action:none;
}

.cell{
  width:40px;
  height:40px;
  background:white;
  border-radius:8px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
  user-select:none;
  transition:0.2s;
}

.cell:hover{
  background:#ddd;
}

.selected{
  background:#a2d2ff;
}

.found1{ background:#ffadad; }
.found2{ background:#caffbf; }
.found3{ background:#ffd6a5; }
.found4{ background:#bdb2ff; }

.words{
  margin-top:20px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
}

.word{
  padding:8px 14px;
  background:#ddd;
  border-radius:20px;
  font-weight:bold;
}

.word.found{
  text-decoration:line-through;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="container">
<h1>Word Search Challenge</h1>

<div id="grid" class="grid"></div>

<div class="words" id="wordList"></div>

</div>

<script>
const words = ["ASHUTOSH","SAMYUKHTHA","CHRISTINE","SIMRAN"];
const gridSize = 12;

const gridElement = document.getElementById("grid");
const wordList = document.getElementById("wordList");

let grid = [];
let selectedCells = [];
let foundCount = 0;

function createEmptyGrid(){
  for(let r=0;r<gridSize;r++){
    grid[r]=[];
    for(let c=0;c<gridSize;c++){
      grid[r][c]="";
    }
  }
}

function placeWord(word){
  let placed=false;
  const directions=[
    [0,1],[1,0],[1,1],[-1,1]
  ];

  while(!placed){
    const dir = directions[Math.floor(Math.random()*directions.length)];
    const row = Math.floor(Math.random()*gridSize);
    const col = Math.floor(Math.random()*gridSize);

    let fits=true;

    for(let i=0;i<word.length;i++){
      const r = row + dir[0]*i;
      const c = col + dir[1]*i;

      if(r<0||c<0||r>=gridSize||c>=gridSize|| 
         (grid[r][c]!=="" && grid[r][c]!==word[i])){
        fits=false;
        break;
      }
    }

    if(fits){
      for(let i=0;i<word.length;i++){
        const r = row + dir[0]*i;
        const c = col + dir[1]*i;
        grid[r][c]=word[i];
      }
      placed=true;
    }
  }
}

function fillRandom(){
  const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for(let r=0;r<gridSize;r++){
    for(let c=0;c<gridSize;c++){
      if(grid[r][c]===""){
        grid[r][c]=letters[Math.floor(Math.random()*letters.length)];
      }
    }
  }
}

function renderGrid(){
  gridElement.innerHTML="";
  grid.forEach((row,r)=>{
    row.forEach((letter,c)=>{
      const div=document.createElement("div");
      div.className="cell";
      div.textContent=letter;
      div.dataset.row=r;
      div.dataset.col=c;
      gridElement.appendChild(div);
    });
  });
}

function renderWords(){
  words.forEach(word=>{
    const div=document.createElement("div");
    div.className="word";
    div.textContent=word;
    div.id="word-"+word;
    wordList.appendChild(div);
  });
}

function getWordFromSelection(){
  return selectedCells.map(cell=>cell.textContent).join("");
}

function clearSelection(){
  selectedCells.forEach(c=>c.classList.remove("selected"));
  selectedCells=[];
}

function checkWord(){
  const formed=getWordFromSelection();
  const reversed=formed.split("").reverse().join("");

  words.forEach((word,index)=>{
    if(formed===word||reversed===word){
      selectedCells.forEach(cell=>{
        cell.classList.add("found"+(index+1));
      });
      document.getElementById("word-"+word).classList.add("found");
      foundCount++;
      if(foundCount===words.length){
        setTimeout(()=>alert("🎉 All Words Found!"),300);
      }
    }
  });
}

let isDragging=false;

gridElement.addEventListener("mousedown",e=>{
  if(!e.target.classList.contains("cell")) return;
  clearSelection();
  isDragging=true;
  e.target.classList.add("selected");
  selectedCells.push(e.target);
});

gridElement.addEventListener("mouseover",e=>{
  if(isDragging && e.target.classList.contains("cell")){
    if(!selectedCells.includes(e.target)){
      e.target.classList.add("selected");
      selectedCells.push(e.target);
    }
  }
});

document.addEventListener("mouseup",()=>{
  if(isDragging){
    checkWord();
    isDragging=false;
    setTimeout(clearSelection,300);
  }
});

/* Mobile */
gridElement.addEventListener("touchstart",e=>{
  const target=document.elementFromPoint(
    e.touches[0].clientX,
    e.touches[0].clientY
  );
  if(target.classList.contains("cell")){
    clearSelection();
    isDragging=true;
    target.classList.add("selected");
    selectedCells.push(target);
  }
});

gridElement.addEventListener("touchmove",e=>{
  const target=document.elementFromPoint(
    e.touches[0].clientX,
    e.touches[0].clientY
  );
  if(isDragging && target.classList.contains("cell")){
    if(!selectedCells.includes(target)){
      target.classList.add("selected");
      selectedCells.push(target);
    }
  }
});

gridElement.addEventListener("touchend",()=>{
  if(isDragging){
    checkWord();
    isDragging=false;
    setTimeout(clearSelection,300);
  }
});

createEmptyGrid();
words.forEach(placeWord);
fillRandom();
renderGrid();
renderWords();
</script>

</body>
</html>
