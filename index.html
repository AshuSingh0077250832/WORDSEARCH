<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Search Challenge</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#4f8a73;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#f4f4f4;
    padding:30px;
    border-radius:20px;
    width:95%;
    max-width:900px;
    text-align:center;
    position:relative;
}

h1{margin-bottom:10px;}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:5px;
    margin:auto;
    user-select:none;
    position:relative;
}

.cell{
    background:#e6e6e6;
    padding:12px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:background .2s;
}

.cell.found{
    color:#fff;
}

.words{
    margin-top:20px;
}

.word{
    display:inline-block;
    background:#ddd;
    padding:8px 15px;
    margin:5px;
    border-radius:20px;
}

.word.found{
    text-decoration:line-through;
    background:#bbb;
}

canvas{
    position:absolute;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>
<body>

<div class="container">
<h1>Word Search Challenge</h1>

<div class="topbar">
<div>⏱ Time: <span id="time">0</span>s</div>
<div>⭐ Score: <span id="score">0</span></div>
</div>

<div class="grid" id="grid"></div>
<canvas id="lineCanvas"></canvas>

<div class="words" id="wordList"></div>
</div>

<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-ball-tap-2073.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const words=["ASHUTOSH","SAMYUKHTHA","CHRISTINE","SIMRAN"];
const gridSize=12;

let gridArray=[];
let foundWords=[];
let score=0;
let timer=0;
let timerInterval;

const grid=document.getElementById("grid");
const wordList=document.getElementById("wordList");
const canvas=document.getElementById("lineCanvas");
const ctx=canvas.getContext("2d");

function startTimer(){
    timerInterval=setInterval(()=>{
        timer++;
        document.getElementById("time").innerText=timer;
    },1000);
}

function generateGrid(){
    gridArray=Array.from({length:gridSize},()=>Array(gridSize).fill(""));
    words.forEach(word=>{
        let placed=false;
        while(!placed){
            let row=Math.floor(Math.random()*gridSize);
            let col=Math.floor(Math.random()*gridSize);
            let dir=Math.floor(Math.random()*8);
            let dr=[0,1,1,1,0,-1,-1,-1][dir];
            let dc=[1,1,0,-1,-1,-1,0,1][dir];
            let fits=true;

            for(let i=0;i<word.length;i++){
                let r=row+i*dr;
                let c=col+i*dc;
                if(r<0||r>=gridSize||c<0||c>=gridSize|| (gridArray[r][c]!=="" && gridArray[r][c]!==word[i])){
                    fits=false;
                    break;
                }
            }

            if(fits){
                for(let i=0;i<word.length;i++){
                    let r=row+i*dr;
                    let c=col+i*dc;
                    gridArray[r][c]=word[i];
                }
                placed=true;
            }
        }
    });

    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            if(gridArray[r][c]==="")
                gridArray[r][c]=String.fromCharCode(65+Math.floor(Math.random()*26));
        }
    }
}

function renderGrid(){
    grid.innerHTML="";
    grid.style.gridTemplateColumns=`repeat(${gridSize},1fr)`;

    gridArray.forEach((row,r)=>{
        row.forEach((letter,c)=>{
            const div=document.createElement("div");
            div.className="cell";
            div.innerText=letter;
            div.dataset.row=r;
            div.dataset.col=c;
            grid.appendChild(div);
        });
    });

    canvas.width=grid.offsetWidth;
    canvas.height=grid.offsetHeight;
}

function renderWords(){
    wordList.innerHTML="";
    words.forEach(word=>{
        const span=document.createElement("span");
        span.className="word";
        span.id="word-"+word;
        span.innerText=word;
        wordList.appendChild(span);
    });
}

function setupSelection(){
    let startCell=null;
    let path=[];

    function clearLine(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
    }

    function drawLine(cells){
        clearLine();
        if(cells.length<2)return;

        const rect=grid.getBoundingClientRect();
        const first=cells[0].getBoundingClientRect();
        const last=cells[cells.length-1].getBoundingClientRect();

        ctx.strokeStyle="rgba(0,0,0,0.3)";
        ctx.lineWidth=6;
        ctx.lineCap="round";

        ctx.beginPath();
        ctx.moveTo(first.left-rect.left+first.width/2,
                   first.top-rect.top+first.height/2);
        ctx.lineTo(last.left-rect.left+last.width/2,
                   last.top-rect.top+last.height/2);
        ctx.stroke();
    }

    function clearTemp(){
        path.forEach(c=>{
            if(!c.classList.contains("found"))
                c.style.background="#e6e6e6";
        });
    }

    function highlightTemp(){
        path.forEach(c=>{
            if(!c.classList.contains("found"))
                c.style.background="#b3d9ff";
        });
    }

    function pointerDown(e){
        if(!e.target.classList.contains("cell")) return;
        startCell=e.target;
        path=[startCell];
        highlightTemp();
    }

    function pointerMove(e){
        if(!startCell) return;
        const cell=document.elementFromPoint(e.clientX,e.clientY);
        if(cell && cell.classList.contains("cell") && !path.includes(cell)){
            path.push(cell);
            highlightTemp();
            drawLine(path);
        }
    }

    function pointerUp(){
        if(!startCell) return;

        const selected=path.map(c=>c.innerText).join("");
        const reversed=selected.split("").reverse().join("");

        if(words.includes(selected) || words.includes(reversed)){
            const actual=words.includes(selected)?selected:reversed;
            const color=`hsl(${Math.random()*360},70%,50%)`;

            path.forEach(c=>{
                c.style.background=color;
                c.classList.add("found");
            });

            document.getElementById("word-"+actual).classList.add("found");
            foundWords.push(actual);
            score+=100;
            document.getElementById("score").innerText=score;
            document.getElementById("correctSound").play();

            if(foundWords.length===words.length){
                clearInterval(timerInterval);
                document.getElementById("winSound").play();
                confetti();
            }

        }else{
            clearTemp();
        }

        clearLine();
        startCell=null;
        path=[];
    }

    grid.addEventListener("pointerdown",pointerDown);
    grid.addEventListener("pointermove",pointerMove);
    grid.addEventListener("pointerup",pointerUp);
}

generateGrid();
renderGrid();
renderWords();
setupSelection();
startTimer();
</script>

</body>
</html>
